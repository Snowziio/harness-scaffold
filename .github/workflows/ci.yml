name: CI Harness

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Harness
        run: |
          mkdir -p reports
          docker compose -f docker/docker-compose.test.yml up \
            --abort-on-container-exit \
            --exit-code-from test 2>&1 | tee reports/test-output.log

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/

      - name: AI failure analysis
        if: failure()
        run: |
          python scripts/analyze_failure.py reports/test-output.log > reports/ai-analysis.md
          cat reports/ai-analysis.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file reports/ai-analysis.md
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GH_TOKEN: ${{ github.token }}

      - name: Notify Feishu on success
        if: success()
        run: |
          python scripts/notify_feishu.py \
            --event ci_passed \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}"
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}

      - name: Notify Feishu on failure
        if: failure()
        run: |
          python scripts/notify_feishu.py \
            --event ci_failed \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}"
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
