name: Fetch Handler Logs
on: workflow_dispatch
jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Get container logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            echo "=== container logs (last 100 lines) ==="
            docker logs $(docker ps -aq --filter name=checkpoint | head -1) 2>&1 | tail -100
            echo "=== env check ==="
            docker inspect $(docker ps -aq --filter name=checkpoint | head -1) --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -E 'FEISHU_CHAT_ID|FEISHU_APP_ID|GH_PAT' | sed 's/=.*/=***/'
