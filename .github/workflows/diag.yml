name: Diagnose Handler

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check container logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            echo "=== running containers ==="
            docker ps -a | grep checkpoint || echo "no checkpoint container"
            echo "=== container logs ==="
            docker logs $(docker ps -aq --filter name=checkpoint | head -1) 2>&1 | tail -30 || echo "no logs"
            echo "=== port check ==="
            ss -tlnp | grep 8002 || echo "8002 not listening"
