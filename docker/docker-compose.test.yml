services:
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      python -m pytest harness/tests/
      -v
      --tb=short
      --cov=src
      --cov-report=term-missing
      --cov-fail-under=80
      --junitxml=reports/test-results.xml
    volumes:
      - ../reports:/app/reports
