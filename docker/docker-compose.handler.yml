services:
  checkpoint-handler:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/checkpoint-handler:${IMAGE_TAG:-latest}
    ports:
      - "8002:8002"   # 仅用于 Docker healthcheck，无需对外暴露
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_CHAT_ID=${FEISHU_CHAT_ID}
      - GH_PAT=${GH_PAT}
      - ALLOWED_REPOS=${ALLOWED_REPOS:-}
    restart: unless-stopped
